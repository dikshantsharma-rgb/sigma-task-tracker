<!DOCTYPE html>
<html>
<head>

<title>Sigma Centuria Task Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select,button{
padding:10px;
margin:5px;
font-size:14px;
}

button{
background:#2f6fed;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.high{color:red;font-weight:bold;}
.medium{color:orange;}
.low{color:green;}

</style>

</head>

<body>

<div class="container">

<h1>Sigma Centuria Task Tracker</h1>

<input id="task" placeholder="Task name">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="addTask()">Add Task</button>

<table id="taskTable">

<thead>
<tr>
<th>Task</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let defaultTasks = [

{task:"Leaflets distribution for first two weekends",priority:"High",status:"Pending"},
{task:"Digital campaign planning (4-5L budget)",priority:"High",status:"Pending"},
{task:"Portal listings (Magicbricks, 99acres)",priority:"High",status:"Pending"},
{task:"Customer testimonial shoot with Dharmraj",priority:"Medium",status:"Pending"},
{task:"Developer shoot arrangement mid-week",priority:"Medium",status:"Pending"},
{task:"Referral scheme creatives (₹51,000 bonus)",priority:"High",status:"Pending"},
{task:"Short reels videos (location, amenities, project highlights)",priority:"High",status:"Pending"},
{task:"GMB listing SEO task for Phase 2",priority:"Medium",status:"Pending"},
{task:"Search campaign (display network)",priority:"High",status:"Pending"},
{task:"Influencer shortlist for sample flat shoot",priority:"Medium",status:"Pending"},
{task:"BW app collaterals update (floor plans, renders)",priority:"High",status:"Pending"},
{task:"Video templates for WhatsApp nurturing",priority:"Medium",status:"Pending"},
{task:"YouTube branding walkthrough video",priority:"Medium",status:"Pending"},
{task:"Drone shoot alignment",priority:"Medium",status:"Pending"},
{task:"Weekly sales review alignment",priority:"Low",status:"Pending"}

];

let tasks = JSON.parse(localStorage.getItem("tasks"));

if(!tasks){
tasks = defaultTasks;
saveTasks();
}

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(){

let tableBody = document.querySelector("#taskTable tbody");
tableBody.innerHTML = "";

tasks.forEach((t,index)=>{

let row = document.createElement("tr");

row.innerHTML = `
<td>${t.task}</td>
<td>${t.priority}</td>
<td>${t.status}</td>
<td><button onclick="deleteTask(${index})">Delete</button></td>
`;

tableBody.appendChild(row);

});

}

function addTask(){

let task = document.getElementById("task").value;
let priority = document.getElementById("priority").value;
let status = document.getElementById("status").value;

if(task==="") return;

tasks.push({task,priority,status});

saveTasks();
renderTasks();

document.getElementById("task").value="";

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();
renderTasks();

}

renderTasks();

</script>

</body>
</html>
