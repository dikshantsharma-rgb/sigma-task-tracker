<!DOCTYPE html>
<html>
<head>
<title>Sigma Task Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input,select,button{
padding:10px;
margin:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
background:#2f6fed;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Sigma Centuria Task Tracker</h1>

<input id="task" placeholder="Task name">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="addTask()">Add Task</button>

<table id="taskTable">

<tr>
<th>Task</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>

<script>

<script>

let tasks = [

{task:"Leaflets distribution for first two weekends",priority:"High",status:"Pending"},
{task:"Digital campaign planning (4-5L budget)",priority:"High",status:"Pending"},
{task:"Portal listings (Magicbricks, 99acres)",priority:"High",status:"Pending"},
{task:"Customer testimonial shoot with Dharmraj",priority:"Medium",status:"Pending"},
{task:"Developer shoot arrangement mid-week",priority:"Medium",status:"Pending"},
{task:"Referral scheme creatives (₹51,000 bonus)",priority:"High",status:"Pending"},
{task:"Short reels videos (location, amenities, project highlights)",priority:"High",status:"Pending"},
{task:"GMB listing SEO task for Phase 2",priority:"Medium",status:"Pending"},
{task:"Search campaign (display network)",priority:"High",status:"Pending"},
{task:"Influencer shortlist for sample flat shoot",priority:"Medium",status:"Pending"},
{task:"BW app collaterals update (floor plans, renders)",priority:"High",status:"Pending"},
{task:"Video templates for WhatsApp nurturing",priority:"Medium",status:"Pending"},
{task:"YouTube branding walkthrough video",priority:"Medium",status:"Pending"},
{task:"Drone shoot alignment",priority:"Medium",status:"Pending"},
{task:"Align sales review weekly",priority:"Low",status:"Pending"}

];

let table=document.getElementById("taskTable");

tasks.forEach(t=>{
let row=table.insertRow();

row.insertCell(0).innerHTML=t.task;
row.insertCell(1).innerHTML=t.priority;
row.insertCell(2).innerHTML=t.status;

let del=row.insertCell(3);
del.innerHTML="<button onclick='deleteRow(this)'>Delete</button>";
});

function addTask(){

let task=document.getElementById("task").value;
let priority=document.getElementById("priority").value;
let status=document.getElementById("status").value;

let row=table.insertRow();

row.insertCell(0).innerHTML=task;
row.insertCell(1).innerHTML=priority;
row.insertCell(2).innerHTML=status;

let del=row.insertCell(3);
del.innerHTML="<button onclick='deleteRow(this)'>Delete</button>";

}

function deleteRow(btn){
let row=btn.parentNode.parentNode;
row.parentNode.removeChild(row);
}

</script>

</body>
</html>
