<!DOCTYPE html>
<html>
<head>

<title>Sigma Centuria Task Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input,select,textarea,button{
padding:10px;
margin:5px;
font-size:14px;
}

textarea{
width:250px;
height:40px;
}

button{
background:#2f6fed;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.completed{
text-decoration:line-through;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<h1>Sigma Centuria Task Tracker</h1>

<input id="task" placeholder="Task name">

<select id="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input id="notes" placeholder="Notes">

<button onclick="addTask()">Add Task</button>

<table id="taskTable">

<thead>
<tr>
<th>Done</th>
<th>Task</th>
<th>Priority</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

let defaultTasks = [

{task:"Leaflets distribution for first two weekends",priority:"High",notes:"Prepare circulation quotation",done:false},

{task:"Digital campaign planning (4-5L budget)",priority:"High",notes:"Google & Meta ads",done:false},

{task:"Portal listings (Magicbricks, 99acres)",priority:"High",notes:"Upload project details",done:false},

{task:"Customer testimonial shoot with Dharmraj",priority:"Medium",notes:"Arrange client visit",done:false},

{task:"Developer shoot arrangement mid-week",priority:"Medium",notes:"Confirm shoot schedule",done:false},

{task:"Referral scheme creatives (₹51,000 bonus)",priority:"High",notes:"Design creatives",done:false},

{task:"Short reels videos (location, amenities, project highlights)",priority:"High",notes:"Shoot & edit reels",done:false},

{task:"GMB listing SEO task for Phase 2",priority:"Medium",notes:"SEO optimisation",done:false},

{task:"Search campaign (display network)",priority:"High",notes:"Track lead quality",done:false},

{task:"Influencer shortlist for sample flat shoot",priority:"Medium",notes:"Get commercials",done:false},

{task:"BW app collaterals update (floor plans, renders)",priority:"High",notes:"Update mobile presenter",done:false},

{task:"Video templates for WhatsApp nurturing",priority:"Medium",notes:"Create message templates",done:false},

{task:"YouTube branding walkthrough video",priority:"Medium",notes:"Script walkthrough",done:false},

{task:"Drone shoot alignment",priority:"Medium",notes:"Schedule location shoot",done:false},

{task:"Weekly sales review alignment",priority:"Low",notes:"Internal review meeting",done:false}

];

let tasks = JSON.parse(localStorage.getItem("tasks"));

if(!tasks){
tasks = defaultTasks;
saveTasks();
}

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks(){

let tableBody = document.querySelector("#taskTable tbody");
tableBody.innerHTML = "";

tasks.forEach((t,index)=>{

let row = document.createElement("tr");

if(t.done){
row.classList.add("completed");
}

row.innerHTML = `
<td><input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleDone(${index})"></td>
<td>${t.task}</td>
<td>${t.priority}</td>
<td>${t.notes}</td>
<td><button onclick="deleteTask(${index})">Delete</button></td>
`;

tableBody.appendChild(row);

});

}

function addTask(){

let task = document.getElementById("task").value;
let priority = document.getElementById("priority").value;
let notes = document.getElementById("notes").value;

if(task==="") return;

tasks.push({
task,
priority,
notes,
done:false
});

saveTasks();
renderTasks();

document.getElementById("task").value="";
document.getElementById("notes").value="";

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();
renderTasks();

}

function toggleDone(index){

tasks[index].done = !tasks[index].done;

saveTasks();
renderTasks();

}

renderTasks();

</script>

</body>
</html>
