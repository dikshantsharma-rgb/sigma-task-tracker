<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sigma Centuria — Task Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --muted:#f1f3f7;
      --primary:#2f6fed;
      --text:#111;
      --border:#ddd;
      --danger:#c62828;
      --warn:#b84e00;
      --success:#156c2f;
      --gray:#666;
    }
    [data-theme="dark"]{
      --bg:#0f1216;
      --card:#151a22;
      --muted:#1b2230;
      --text:#eaeef5;
      --border:#2a3443;
      --primary:#5a84ff;
      --gray:#aab2bf;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:28px;
    }
    .container{
      max-width:1100px;
      margin:auto;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
      overflow:hidden;
    }
    header{
      padding:18px 20px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    h1{
      font-size:20px;
      margin:0;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .badge{
      background:var(--muted);
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      color:var(--gray);
    }
    .toolbar{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    main{ padding:18px 20px; }

    .dashboard{
      display:grid;
      grid-template-columns: repeat(4, minmax(140px,1fr));
      gap:12px;
    }
    .card{
      background:var(--muted);
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
    }
    .kpi{
      font-size:12px; color:var(--gray);
    }
    .kpi strong{
      font-size:18px; color:var(--text);
    }
    .progress{
      height:10px; background:#e8edf5; border-radius:6px; overflow:hidden; border:1px solid var(--border); margin-top:8px;
    }
    .progress > div{
      height:100%; background:var(--primary); width:0%;
      transition:width .25s ease;
    }

    .controls{
      display:grid;
      grid-template-columns: 1fr 140px 160px 160px auto;
      gap:8px;
      margin-top:16px;
    }
    .filters{
      display:grid;
      grid-template-columns: 1fr 140px 140px 160px 160px auto;
      gap:8px;
      margin-top:16px;
      align-items:center;
    }
    input[type="text"], input[type="date"], select, button{
      padding:10px 12px; font-size:14px; border:1px solid var(--border); background:#fff; color:var(--text);
      border-radius:8px; outline:none;
    }
    [data-theme="dark"] input[type="text"], [data-theme="dark"] input[type="date"], [data-theme="dark"] select{
      background:#0c111a; border-color:#2a3443; color:var(--text);
    }
    button{
      background:var(--primary); color:#fff; border:none; cursor:pointer;
    }
    button.secondary{ background:#596173; color:#fff; }
    button.ghost{ background:transparent; border:1px solid var(--border); color:var(--text); }
    button.warn{ background:var(--warn); }
    button.danger{ background:var(--danger); }
    button:disabled{ opacity:0.6; cursor:not-allowed; }
    label small{ color:var(--gray); }

    table{
      width:100%; border-collapse: collapse; margin-top:16px; border:1px solid var(--border); border-radius:10px; overflow:hidden;
    }
    th, td{
      padding:12px; border-bottom:1px solid var(--border); text-align:left; vertical-align: middle;
    }
    thead th{ background:#f8fafc; }
    [data-theme="dark"] thead th{ background:#131823; }
    tr.completed td{ color:#8a8f99; text-decoration: line-through; }
    .notesInput{ width: 240px; padding:6px 8px; }
    .ownerInput{ width: 140px; padding:6px 8px; }
    .cellInput{
      width: 100%; padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--text);
    }
    .cellInput:focus{ outline:2px solid rgba(47,111,237,0.25); }
    .pill{
      padding:4px 8px; border-radius:999px; font-size:12px; border:1px solid var(--border); display:inline-block;
    }
    .High{ background:#ffe9e6; color:#8a1b0d; border-color:#ffc0b8; }
    .Medium{ background:#fff4e3; color:#8a4c0d; border-color:#ffd9a3; }
    .Low{ background:#e9f6ea; color:#135f1c; border-color:#a6e0ac; }

    .statusbar{
      margin-top:12px; display:flex; gap:12px; align-items:center; color:var(--gray); font-size:12px;
    }
    .dot{ width:8px; height:8px; border-radius:50%; background:var(--primary); display:inline-block; }

    .visually-hidden{ position:absolute !important; left:-9999px !important; width:1px; height:1px; overflow:hidden; }
    @media (max-width: 900px){
      .controls{ grid-template-columns: 1fr 120px 140px 1fr auto; }
      .filters{ grid-template-columns: 1fr 120px 120px 140px 140px auto; }
      .notesInput{ width:180px; }
    }
    @media (max-width: 680px){
      .controls, .filters{
        grid-template-columns: 1fr;
      }
      .dashboard{ grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <header>
      <h1>🗂️ Sigma Centuria <span class="badge">Task Tracker</span></h1>
      <div class="toolbar">
        <button id="themeToggle" class="ghost" title="Toggle theme">🌓 Theme</button>
        <button id="exportBtn" class="secondary" title="Download tasks as JSON">Export</button>
        <label class="ghost" style="padding:10px 12px; cursor:pointer;" title="Import tasks from JSON">
          Import<input id="importFile" type="file" accept="application/json" class="visually-hidden" />
        </label>
        <button id="resetBtn" class="warn" title="Reset to default tasks">Reset</button>
        <button id="clearBtn" class="danger" title="Clear all tasks">Clear</button>
      </div>
    </header>

    <main>
      <!-- KPI / Progress -->
      <section class="dashboard" aria-label="Dashboard">
        <div class="card">
          <div class="kpi">Total Tasks</div>
          <div class="kpi"><strong id="kpiTotal">0</strong></div>
        </div>
        <div class="card">
          <div class="kpi">Completed</div>
          <div class="kpi"><strong id="kpiCompleted">0</strong></div>
        </div>
        <div class="card">
          <div class="kpi">Pending</div>
          <div class="kpi"><strong id="kpiPending">0</strong></div>
        </div>
        <div class="card" aria-label="Progress">
          <div class="kpi">Progress</div>
          <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressBar"></div>
          </div>
        </div>
      </section>

      <!-- Add Task -->
      <section class="controls" aria-label="Add task">
        <input id="taskInput" type="text" placeholder="Task name (e.g., Launch Google Ads for Phase 2)" />
        <select id="priorityInput" aria-label="Priority">
          <option>High</option><option>Medium</option><option>Low</option>
        </select>
        <input id="deadlineInput" type="date" aria-label="Deadline (optional)" />
        <input id="ownerInput" type="text" placeholder="Owner (optional)" />
        <button id="addBtn">Add Task</button>
      </section>

      <!-- Filters / Sorting -->
      <section class="filters" aria-label="Filters">
        <input id="searchInput" type="text" placeholder="Search task, notes, or owner…" />
        <select id="statusFilter" aria-label="Status filter">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        <select id="priorityFilter" aria-label="Priority filter">
          <option value="all">All priorities</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select id="ownerFilter" aria-label="Owner filter">
          <option value="all">All owners</option>
        </select>
        <select id="sortSelect" aria-label="Sort">
          <option value="createdDesc">Sort: Newest</option>
          <option value="createdAsc">Sort: Oldest</option>
          <option value="priority">Sort: Priority</option>
          <option value="deadlineAsc">Sort: Deadline ↑</option>
          <option value="deadlineDesc">Sort: Deadline ↓</option>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
        </select>
        <button id="clearFilters" class="ghost">Clear Filters</button>
      </section>

      <!-- Table -->
      <section aria-label="Task list">
        <table id="taskTable">
          <thead>
            <tr>
              <th>Done</th>
              <th>Task</th>
              <th>Priority</th>
              <th>Deadline</th>
              <th>Owner</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="taskBody"></tbody>
        </table>
      </section>

      <div class="statusbar" aria-live="polite">
        <span class="dot"></span>
        <span id="statusText">Ready</span>
        <span id="lastSaved"></span>
      </div>

      <div id="errorBox" class="visually-hidden" aria-live="assertive"></div>
    </main>
  </div>

  <script type="module">
    /***************
     * CONFIG / CONST
     ***************/
    const APP = {
      STORAGE_KEY_V2: "sigmaCenturia.tasks.v2",
      STORAGE_KEY_V1: "tasks",               // migrate old data if found
      THEME_KEY: "sigmaCenturia.theme",
      SCHEMA_VERSION: 2,
      PRIORITY_ORDER: { High: 3, Medium: 2, Low: 1 },
    };

    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));

    const escapeHtml = (str) =>
      String(str ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

    const fmtDate = (iso) => {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString();
    };

    const debounce = (fn, ms=300) => {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
    };

    const uuid = () => (crypto?.randomUUID?.() ?? (Date.now().toString(36) + Math.random().toString(36).slice(2)));

    /***************
     * STORAGE (safe)
     ***************/
    const Storage = {
      load(){
        // Try v2
        try {
          const raw = localStorage.getItem(APP.STORAGE_KEY_V2);
          if (raw){
            const parsed = JSON.parse(raw);
            if (parsed?.version === APP.SCHEMA_VERSION && Array.isArray(parsed?.items)) {
              return parsed.items;
            }
          }
        } catch (e) {
          console.warn("Failed to load v2:", e);
        }
        // Migrate from v1 (old "tasks" array without ids)
        try {
          const rawV1 = localStorage.getItem(APP.STORAGE_KEY_V1);
          if (rawV1) {
            const arr = JSON.parse(rawV1);
            if (Array.isArray(arr)) {
              const migrated = arr.map(t => ({
                id: uuid(),
                task: String(t.task ?? ""),
                priority: ["High","Medium","Low"].includes(t.priority) ? t.priority : "Medium",
                notes: String(t.notes ?? ""),
                done: Boolean(t.done),
                owner: "",
                deadline: "",
                createdAt: Date.now(),
              }));
              this.save(migrated);
              // Remove old key to avoid confusion
              localStorage.removeItem(APP.STORAGE_KEY_V1);
              return migrated;
            }
          }
        } catch (e) {
          console.warn("Failed to migrate from v1:", e);
        }
        // Seed defaults
        const seeded = Defaults.seed();
        this.save(seeded);
        return seeded;
      },
      save(items){
        try {
          localStorage.setItem(APP.STORAGE_KEY_V2, JSON.stringify({ version: APP.SCHEMA_VERSION, items }));
          UI.markSaved();
        } catch (e) {
          UI.error("Saving to localStorage failed. If you're in Private/Incognito mode or storage is blocked, enable storage or use a normal window.\n\n" + e.message);
        }
      },
      clear(){
        localStorage.removeItem(APP.STORAGE_KEY_V2);
      },
    };

    /***************
     * DEFAULT DATA
     ***************/
    const Defaults = {
      list: [
        {task:"Leaflets distribution for first two weekends",priority:"High",notes:"Prepare circulation quotation",done:false},
        {task:"Digital campaign planning (4-5L budget)",priority:"High",notes:"Google & Meta ads",done:false},
        {task:"Portal listings (Magicbricks, 99acres)",priority:"High",notes:"Upload project details",done:false},
        {task:"Customer testimonial shoot with Dharmraj",priority:"Medium",notes:"Arrange client visit",done:false},
        {task:"Developer shoot arrangement mid-week",priority:"Medium",notes:"Confirm shoot schedule",done:false},
        {task:"Referral scheme creatives (₹51,000 bonus)",priority:"High",notes:"Design creatives",done:false},
        {task:"Short reels videos (location, amenities, project highlights)",priority:"High",notes:"Shoot & edit reels",done:false},
        {task:"GMB listing SEO task for Phase 2",priority:"Medium",notes:"SEO optimisation",done:false},
        {task:"Search campaign (display network)",priority:"High",notes:"Track lead quality",done:false},
        {task:"Influencer shortlist for sample flat shoot",priority:"Medium",notes:"Get commercials",done:false},
        {task:"BW app collaterals update (floor plans, renders)",priority:"High",notes:"Update mobile presenter",done:false},
        {task:"Video templates for WhatsApp nurturing",priority:"Medium",notes:"Create message templates",done:false},
        {task:"YouTube branding walkthrough video",priority:"Medium",notes:"Script walkthrough",done:false},
        {task:"Drone shoot alignment",priority:"Medium",notes:"Schedule location shoot",done:false},
        {task:"Weekly sales review alignment",priority:"Low",notes:"Internal review meeting",done:false}
      ],
      seed(){
        const now = Date.now();
        return this.list.map((t, i) => ({
          id: uuid(),
          task: t.task,
          priority: t.priority,
          notes: t.notes,
          done: t.done,
          owner: "",
          deadline: "",
          createdAt: now + i,
        }));
      }
    };

    /***************
     * MODEL (State & Ops)
     ***************/
    const State = {
      items: [],
      filters: {
        q: "",
        status: "all",
        priority: "all",
        owner: "all",
        sort: "createdDesc",
      },
      init(){
        this.items = Storage.load();
      },
      add({ task, priority, notes, owner, deadline }){
        const item = {
          id: uuid(),
          task: task.trim(),
          priority: ["High","Medium","Low"].includes(priority) ? priority : "Medium",
          notes: notes?.trim() ?? "",
          done: false,
          owner: owner?.trim() ?? "",
          deadline: deadline || "",
          createdAt: Date.now(),
        };
        this.items.unshift(item); // newest first
        Storage.save(this.items);
        return item;
      },
      update(id, patch){
        const i = this.items.findIndex(x => x.id === id);
        if (i === -1) return;
        this.items[i] = { ...this.items[i], ...patch };
        Storage.save(this.items);
      },
      remove(id){
        this.items = this.items.filter(x => x.id !== id);
        Storage.save(this.items);
      },
      toggleDone(id){
        const it = this.items.find(x => x.id === id);
        if (!it) return;
        it.done = !it.done;
        Storage.save(this.items);
      },
      clear(){
        this.items = [];
        Storage.save(this.items);
      },
      reset(){
        this.items = Defaults.seed();
        Storage.save(this.items);
      },
      deriveOwners(){
        const owners = new Set(this.items.map(i => i.owner).filter(Boolean));
        return ["all", ...Array.from(owners).sort((a,b)=>a.localeCompare(b))];
      },
      query(){
        let list = [...this.items];

        // filter
        const { q, status, priority, owner } = this.filters;
        if (status !== "all") {
          list = list.filter(i => status === "completed" ? i.done : !i.done);
        }
        if (priority !== "all") {
          list = list.filter(i => i.priority === priority);
        }
        if (owner !== "all") {
          list = list.filter(i => i.owner === owner);
        }
        if (q) {
          const needle = q.toLowerCase();
          list = list.filter(i =>
            i.task.toLowerCase().includes(needle) ||
            (i.notes||"").toLowerCase().includes(needle) ||
            (i.owner||"").toLowerCase().includes(needle)
          );
        }

        // sort
        const sort = this.filters.sort;
        const prio = (p) => APP.PRIORITY_ORDER[p] || 0;
        list.sort((a,b) => {
          switch (sort) {
            case "createdAsc": return a.createdAt - b.createdAt;
            case "createdDesc": return b.createdAt - a.createdAt;
            case "priority": return prio(b.priority) - prio(a.priority) || a.task.localeCompare(b.task);
            case "deadlineAsc": return (a.deadline||"") < (b.deadline||"") ? -1 : (a.deadline||"") > (b.deadline||"") ? 1 : 0;
            case "deadlineDesc": return (a.deadline||"") > (b.deadline||"") ? -1 : (a.deadline||"") < (b.deadline||"") ? 1 : 0;
            case "name": return a.task.localeCompare(b.task);
            case "status": return (a.done === b.done) ? 0 : a.done ? 1 : -1;
            default: return b.createdAt - a.createdAt;
          }
        });
        return list;
      },
      kpis(){
        const total = this.items.length;
        const completed = this.items.filter(i => i.done).length;
        const pending = total - completed;
        const pct = total ? Math.round((completed/total)*100) : 0;
        return { total, completed, pending, pct };
      }
    };

    /***************
     * UI / VIEW
     ***************/
    const UI = {
      els: {
        body: document.body,
        taskBody: $("#taskBody"),
        kpiTotal: $("#kpiTotal"),
        kpiCompleted: $("#kpiCompleted"),
        kpiPending: $("#kpiPending"),
        progressBar: $("#progressBar").parentElement,
        progressFill: $("#progressBar"),
        statusText: $("#statusText"),
        lastSaved: $("#lastSaved"),
        ownerFilter: $("#ownerFilter"),
        errorBox: $("#errorBox"),
      },
      renderAll(){
        // table
        const rows = State.query().map(it => UI.row(it)).join("");
        this.els.taskBody.innerHTML = rows || `<tr><td colspan="7" style="color:var(--gray);">No tasks yet. Add your first one above.</td></tr>`;

        // kpis + progress
        const { total, completed, pending, pct } = State.kpis();
        this.els.kpiTotal.textContent = total;
        this.els.kpiCompleted.textContent = completed;
        this.els.kpiPending.textContent = pending;
        this.els.progressBar.setAttribute("aria-valuenow", pct);
        this.els.progressFill.style.width = pct + "%";

        // owner filter options
        const owners = State.deriveOwners();
        const current = State.filters.owner;
        UI.els.ownerFilter.innerHTML = owners.map(o => `<option value="${escapeHtml(o)}"${o===current?' selected':''}>${o==="all"?"All owners":escapeHtml(o)}</option>`).join("");
      },
      row(it){
        const overdue = it.deadline && !it.done && new Date(it.deadline) < new Date();
        return `
          <tr data-id="${it.id}" class="${it.done ? 'completed' : ''}">
            <td><input type="checkbox" class="toggleDone" ${it.done ? 'checked' : ''} aria-label="Mark done"></td>
            <td>${escapeHtml(it.task)}</td>
            <td><span class="pill ${it.priority}">${it.priority}</span></td>
            <td>
              <input class="cellInput" type="date" value="${it.deadline || ''}" aria-label="Deadline"${overdue?' style="border-color:#ff6b6b; background:#fff3f3;"':''}/>
            </td>
            <td>
              <input class="cellInput ownerInput" type="text" value="${escapeHtml(it.owner||'')}" placeholder="Owner" aria-label="Owner"/>
            </td>
            <td>
              <input class="cellInput notesInput" type="text" value="${escapeHtml(it.notes||'')}" placeholder="Notes" aria-label="Notes"/>
            </td>
            <td>
              <button class="ghost editBtn" title="Edit task name">Edit</button>
              <button class="danger deleteBtn" title="Delete task">Delete</button>
            </td>
          </tr>
        `;
      },
      info(msg){ this.els.statusText.textContent = msg; },
      markSaved(){
        const ts = new Date();
        $("#lastSaved").textContent = "• Last saved: " + ts.toLocaleString();
        this.info("Saved");
      },
      error(msg){
        const eb = this.els.errorBox;
        eb.classList.remove("visually-hidden");
        eb.textContent = msg;
        setTimeout(()=>{ eb.classList.add("visually-hidden"); }, 5000);
      }
    };

    /***************
     * CONTROLLER / EVENTS
     ***************/
    const Controller = {
      init(){
        // Theme
        const theme = localStorage.getItem(APP.THEME_KEY) || "light";
        document.documentElement.setAttribute("data-theme", theme);

        // Load state + render
        State.init();
        UI.renderAll();

        // Add Task
        $("#addBtn").addEventListener("click", Controller.addTask);
        $("#taskInput").addEventListener("keydown", e => { if (e.key==="Enter") Controller.addTask(); });
        $("#ownerInput").addEventListener("keydown", e => { if (e.key==="Enter") Controller.addTask(); });
        $("#deadlineInput").addEventListener("keydown", e => { if (e.key==="Enter") Controller.addTask(); });

        // Filters
        $("#searchInput").addEventListener("input", debounce((e)=>{ State.filters.q = e.target.value.trim(); UI.renderAll(); }, 150));
        $("#statusFilter").addEventListener("change", (e)=>{ State.filters.status = e.target.value; UI.renderAll(); });
        $("#priorityFilter").addEventListener("change", (e)=>{ State.filters.priority = e.target.value; UI.renderAll(); });
        $("#ownerFilter").addEventListener("change", (e)=>{ State.filters.owner = e.target.value; UI.renderAll(); });
        $("#sortSelect").addEventListener("change", (e)=>{ State.filters.sort = e.target.value; UI.renderAll(); });
        $("#clearFilters").addEventListener("click", ()=>{
          State.filters = { q:"", status:"all", priority:"all", owner:"all", sort:"createdDesc" };
          $("#searchInput").value = "";
          $("#statusFilter").value = "all";
          $("#priorityFilter").value = "all";
          $("#sortSelect").value = "createdDesc";
          UI.renderAll();
        });

        // Theme
        $("#themeToggle").addEventListener("click", ()=>{
          const isDark = document.documentElement.getAttribute("data-theme") === "dark";
          const next = isDark ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", next);
          localStorage.setItem(APP.THEME_KEY, next);
        });

        // Export / Import / Reset / Clear
        $("#exportBtn").addEventListener("click", Controller.exportJson);
        $("#importFile").addEventListener("change", Controller.importJson);
        $("#resetBtn").addEventListener("click", ()=>{
          if (confirm("Reset to default tasks? This will overwrite your current list.")) {
            State.reset(); UI.renderAll();
          }
        });
        $("#clearBtn").addEventListener("click", ()=>{
          if (confirm("Clear ALL tasks? This cannot be undone.")) {
            State.clear(); UI.renderAll();
          }
        });

        // Table Delegation
        $("#taskBody").addEventListener("change", Controller.onTableChange);
        $("#taskBody").addEventListener("input", debounce(Controller.onTableInput, 200));
        $("#taskBody").addEventListener("click", Controller.onTableClick);

        // Sync across tabs on same machine
        window.addEventListener("storage", (e) => {
          if (e.key === APP.STORAGE_KEY_V2) {
            State.items = Storage.load();
            UI.renderAll();
            UI.info("Synced from another tab");
          }
        });
      },

      addTask(){
        const task = $("#taskInput").value;
        const priority = $("#priorityInput").value;
        const owner = $("#ownerInput").value;
        const deadline = $("#deadlineInput").value;
        if (!task.trim()) {
          UI.error("Task name cannot be empty.");
          $("#taskInput").focus();
          return;
        }
        State.add({ task, priority, notes: "", owner, deadline });
        // Clear inputs
        $("#taskInput").value = ""; $("#ownerInput").value = ""; $("#deadlineInput").value = "";
        $("#taskInput").focus();
        UI.renderAll();
      },

      // Checkbox, date changes
      onTableChange(e){
        const row = e.target.closest("tr[data-id]");
        if (!row) return;
        const id = row.dataset.id;
        if (e.target.classList.contains("toggleDone")){
          State.toggleDone(id);
          UI.renderAll(); // apply strike-through + recalc kpis
          return;
        }
        // Date change
        if (e.target.type === "date"){
          State.update(id, { deadline: e.target.value || "" });
          UI.renderAll(); // re-eval overdue styling
        }
      },

      // Inline inputs (notes/owner)
      onTableInput(e){
        const row = e.target.closest("tr[data-id]");
        if (!row) return;
        const id = row.dataset.id;
        if (e.target.classList.contains("notesInput")){
          State.update(id, { notes: e.target.value });
          UI.info("Saving...");
        } else if (e.target.classList.contains("ownerInput")){
          State.update(id, { owner: e.target.value });
          UI.info("Saving...");
        }
      },

      onTableClick(e){
        const row = e.target.closest("tr[data-id]");
        if (!row) return;
        const id = row.dataset.id;
        if (e.target.classList.contains("deleteBtn")){
          if (confirm("Delete this task?")) {
            State.remove(id);
            UI.renderAll();
          }
        } else if (e.target.classList.contains("editBtn")){
          Controller.editTaskName(row, id);
        }
      },

      editTaskName(row, id){
        const cell = row.children[1];
        const current = cell.textContent;
        const input = document.createElement("input");
        input.type = "text";
        input.className = "cellInput";
        input.value = current;
        input.ariaLabel = "Edit task name";
        cell.replaceChildren(input);
        input.focus();
        input.select();
        const commit = () => {
          const next = input.value.trim();
          if (next) State.update(id, { task: next });
          UI.renderAll();
        };
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") commit();
          if (e.key === "Escape") UI.renderAll();
        });
        input.addEventListener("blur", commit);
      },

      exportJson(){
        try {
          const blob = new Blob([JSON.stringify(State.items, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `sigma-centuria-tasks-${Date.now()}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          UI.info("Exported JSON");
        } catch (e) { UI.error("Export failed: " + e.message); }
      },

      async importJson(e){
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (!Array.isArray(data)) throw new Error("Invalid file format: expected an array");
          // normalize
          State.items = data.map(x => ({
            id: x.id || uuid(),
            task: String(x.task ?? ""),
            priority: ["High","Medium","Low"].includes(x.priority) ? x.priority : "Medium",
            notes: String(x.notes ?? ""),
            done: Boolean(x.done),
            owner: String(x.owner ?? ""),
            deadline: String(x.deadline ?? ""),
            createdAt: Number.isFinite(x.createdAt) ? x.createdAt : Date.now(),
          }));
          Storage.save(State.items);
          UI.renderAll();
          UI.info("Imported JSON");
          e.target.value = ""; // reset input
        } catch (err) {
          UI.error("Import failed: " + err.message);
        }
      }
    };

    /***************
     * BOOT
     ***************/
    Controller.init();
  </script>
</body>
</html>
